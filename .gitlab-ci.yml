stages:
  - build
  - code-quality

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""

default:
  image: composer:2

composer:
  stage: build
  image: composer:2
  script:
    - composer install --working-dir=app --no-interaction --prefer-dist --no-progress
  artifacts:
    paths:
      - app/vendor
    expire_in: 1h

build:
  stage: build
  image: docker:latest
  script:
    - docker build -f docker/php/Dockerfile -t pizza-backend .

phpstan:
  stage: code-quality
  image: composer:2
  allow_failure: true
  needs:
    - composer
  script:
    - app/vendor/bin/phpstan analyse app/app app/routes app/config app/database

php-cs-fixer:
  stage: code-quality
  image: composer:2
  needs:
    - composer
  script:
    - app/vendor/bin/php-cs-fixer fix --dry-run --diff

rector:
  stage: code-quality
  image: composer:2
  needs:
    - composer
  script:
    - app/vendor/bin/rector process --dry-run

tests:
  stage: code-quality
  image: pizza-backend:latest
  needs:
    - composer
    - build
  script:
    - cd app
    - php artisan test