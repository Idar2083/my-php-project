stages:
  - build
  - code-quality

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""

default:
  image: composer:2

composer:
  stage: build

  before_script:
    - cd app

  script:
    - composer install --no-interaction --prefer-dist --no-progress

  artifacts:
    paths:
      - app/vendor/
    expire_in: 1h

build:
  stage: build
  image: docker:latest

  script:
    - docker build -f docker/php/Dockerfile -t pizza-backend .

phpstan:
  stage: code-quality
  image: composer:2

  needs:
    - composer

  script:
    - vendor/bin/phpstan analyse app routes config database

php-cs-fixer:
  stage: code-quality
  image: composer:2

  needs:
    - composer

  script:
    - vendor/bin/php-cs-fixer fix --dry-run --diff

rector:
  stage: code-quality
  image: composer:2

  needs:
    - composer

  script:
    - vendor/bin/rector process --dry-run

tests:
  stage: code-quality
  image: composer:2

  needs:
    - composer

  script:
    - php artisan test